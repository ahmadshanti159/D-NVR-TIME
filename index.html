<!DOCTYPE html>
<html lang="ar" >
<head>
  <meta charset="UTF-8" />
  <title>تحويل الساعة بين DVR والواقع - ثيم غامق</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      text-align: center;
      background-color: #121212;
      padding: 30px;
      position: relative;
      color: #eee;
      overflow: hidden;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .header img {
      height: 50px;
      filter: brightness(1.2) contrast(1.1);
    }

    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 5px;
      transition: background 0.3s, border-color 0.3s;
    }

    input:focus, button:hover {
      background: #333;
      border-color: #08f;
      outline: none;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 20px;
      color: #eee;
    }

    .result .highlight {
      color: #00aaff;
      font-weight: 700;
    }

    .result .time-real {
      color: #ffea00;
      font-weight: 700;
    }

    .watermark {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 0;
      pointer-events: none;
      user-select: none;
      color: rgba(255, 255, 255, 0.07);
      font-weight: 900;
      font-size: 60px;
      line-height: 100px;
      text-align: center;
      white-space: nowrap;
      letter-spacing: 4px;
      text-transform: lowercase;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .watermark span {
      display: block;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 450px;
      margin: 0 auto;
    }

    .footer {
      margin-top: 40px;
      font-size: 18px;
      color: #888;
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>

  <!-- الشعار العلوي -->
  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Palestinian_Police_Logo.png/240px-Palestinian_Police_Logo.png" alt="شعار الشرطة الفلسطينية">
  </div>

  <!-- العلامة المائية -->
  <div class="watermark" aria-hidden="true">
    <span>ahmad shanti</span>
    <span>ahmad shanti</span>
  </div>

  <div class="content" role="main">
    <h1>🔁 تحويل الساعة بين DVR والساعة الحقيقية</h1>

    <label for="dvrTime">🕹️ أدخل ساعة الـDVR الحالية:</label><br>
    <input type="time" id="dvrTime" aria-required="true"><br>

    <label for="realTargetTime">⏱️ أدخل الساعة الحقيقية التي تريد الرجوع لها:</label><br>
    <input type="time" id="realTargetTime" aria-required="true"><br>

    <button onclick="eval(_xsh)">احسب الساعة على الـDVR</button>

    <div class="result" id="output" aria-live="polite" aria-atomic="true"></div>

    <div class="footer" id="footer"> أحمد شنطي</div>
  </div>

  <script>
    const _xsh = `(function(){
      const dvrInput = document.getElementById("dvrTime").value;
      const targetRealInput = document.getElementById("realTargetTime").value;
      if (!dvrInput || !targetRealInput) {
        alert("الرجاء إدخال كل الساعات");
        return;
      }
      const [dvrH, dvrM] = dvrInput.split(":").map(Number);
      const [targetH, targetM] = targetRealInput.split(":").map(Number);
      const now = new Date();
      const realNow = new Date(now);
      const dvrNow = new Date(now);
      dvrNow.setHours(dvrH, dvrM, 0, 0);
      const offsetMs = dvrNow.getTime() - realNow.getTime();
      const targetReal = new Date(now);
      targetReal.setHours(targetH, targetM, 0, 0);
      const targetDvrTime = new Date(targetReal.getTime() + offsetMs);
      document.getElementById("output").innerHTML = 
        "✅ إذا أردت الرجوع إلى الساعة <strong class='time-real'>" + targetReal.toLocaleTimeString() + "</strong> (الواقعية)<br>" +
        "⏩ فابحث عنها في الـDVR على الساعة: <span class='highlight'>" + targetDvrTime.toLocaleTimeString() + "</span><br><br>" +
        "📏 فرق التوقيت الحالي بين DVR وجهازك: <strong>" + Math.round(offsetMs/60000) + " دقيقة</strong>";
      document.getElementById("footer").style.display = 'block';
    })();`;
  </script>
</body>
</html>
